<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<title>Igra čestica</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: radial-gradient(circle at center, #0f0c29, #302b63, #24243e);
    height: 100%;
    font-family: sans-serif;
  }
  canvas {
    display: block;
  }
  #info {
    position: fixed;
    top: 16px;
    left: 16px;
    color: rgba(255,255,255,0.7);
    font-size: 14px;
    pointer-events: none;
    user-select: none;
  }
</style>
</head>
<body>
<div id="info">Klikni ili prevuci mišem po ekranu ✨</div>
<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

const particles = [];
const colors = ['#ff6b6b', '#feca57', '#1dd1a1', '#54a0ff', '#ff9ff3', '#00d2d3'];

class Particle {
  constructor(x, y) {
    this.x = x;
    this.y = y;
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 4;
    this.vx = Math.cos(angle) * speed;
    this.vy = Math.sin(angle) * speed;
    this.radius = 2 + Math.random() * 4;
    this.color = colors[Math.floor(Math.random() * colors.length)];
    this.life = 1;
    this.decay = 0.005 + Math.random() * 0.01;
  }
  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.vy += 0.02; // blaga gravitacija
    this.vx *= 0.99;
    this.vy *= 0.99;
    this.life -= this.decay;
  }
  draw() {
    ctx.globalAlpha = Math.max(this.life, 0);
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
    ctx.fillStyle = this.color;
    ctx.shadowBlur = 10;
    ctx.shadowColor = this.color;
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

function spawnBurst(x, y, count = 25) {
  for (let i = 0; i < count; i++) {
    particles.push(new Particle(x, y));
  }
}

let mouseDown = false;

canvas.addEventListener('mousedown', (e) => {
  mouseDown = true;
  spawnBurst(e.clientX, e.clientY, 35);
});
canvas.addEventListener('mouseup', () => mouseDown = false);
canvas.addEventListener('mousemove', (e) => {
  if (mouseDown) spawnBurst(e.clientX, e.clientY, 6);
});
canvas.addEventListener('touchstart', (e) => {
  for (const t of e.touches) spawnBurst(t.clientX, t.clientY, 35);
}, { passive: true });
canvas.addEventListener('touchmove', (e) => {
  for (const t of e.touches) spawnBurst(t.clientX, t.clientY, 6);
}, { passive: true });

function animate() {
  ctx.fillStyle = 'rgba(15, 12, 41, 0.15)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.update();
    p.draw();
    if (p.life <= 0) particles.splice(i, 1);
  }

  requestAnimationFrame(animate);
}
animate();

// mali automatski "pozdravni" salvo na pokretanje
spawnBurst(window.innerWidth / 2, window.innerHeight / 2, 60);
</script>
</body>
</html>
